<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <script>
    // GitHub Pages serves this file for any unknown path.
    // Encode the requested path as ?p= and send to index.html,
    // which decodes it and handles slug routing or renders normally.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + '/?p=' +
      encodeURIComponent(l.pathname.slice(1) + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
